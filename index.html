<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Pixel Stamp Maker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
</head>
<body>

<div class="window">
    <div class="title-bar">
        <span>Square_Stamp_Maker_v4.exe</span>
        <div class="window-controls">
            <button class="btn-sm">_</button>
            <button class="btn-sm">X</button>
        </div>
    </div>
    
    <div class="content">
        <p>Upload an image to generate a 99x99 square pixel stamp.</p>
        
        <div class="form-group">
            <label for="imageUpload">Image:</label>
            <input type="file" id="imageUpload" accept="image/*">
        </div>

        <div class="form-group">
            <label for="blinkyText">Blinky Text (Optional):</label>
            <input type="text" id="blinkyText" placeholder="e.g. L0VE" maxlength="10">
        </div>

        <div class="form-group">
            <label>Output Format:</label><br>
            <label><input type="radio" name="format" id="formatGif" value="gif" checked> Animated GIF</label>
            <label><input type="radio" name="format" id="formatPng" value="png"> Static PNG</label>
        </div>

        <button id="generate">Generate Stamp</button>
        <p id="status"></p>

        <div class="preview-container">
            <img id="result" alt="Your stamp will appear here" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=">
        </div>
        
        <a id="download" style="display: none;">Download File</a>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
